# .github/workflows/build.yml
name: Android Native CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NDK_VERSION:   "27.1.12297006"
  CMAKE_VERSION: "3.28.3"
  JAVA_VERSION:  "17"

jobs:
  # ── Build debug APK ─────────────────────────────────────────────────────────
  build-debug:
    name: Debug Build (arm64-v8a + armeabi-v7a)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1   # Shallow clone for speed

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager "ndk;${{ env.NDK_VERSION }}"
          sdkmanager "cmake;${{ env.CMAKE_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: cmake-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/**/*.cmake', 'app/src/main/cpp/CMakeLists.txt') }}

      - name: Cache FetchContent dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cmake/packages
          key: fetchcontent-${{ runner.os }}-${{ hashFiles('app/src/main/cpp/CMakeLists.txt') }}

      - name: Build debug APK
        run: |
          ./gradlew assembleDebug \
            --parallel \
            --build-cache \
            --no-daemon \
            -Porg.gradle.jvmargs="-Xmx6g"

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: debug-apks
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Check binary size
        run: |
          SO="app/build/intermediates/merged_native_libs/debug/out/lib/arm64-v8a/libhero_shooter_engine.so"
          SIZE=$(stat -c%s "$SO")
          echo "arm64-v8a .so size: $SIZE bytes ($(echo "$SIZE/1024/1024" | bc) MB)"
          # Fail CI if .so exceeds 32 MB (adjust as needed)
          [ "$SIZE" -lt $((32 * 1024 * 1024)) ] || \
              (echo "ERROR: .so exceeds 32 MB budget" && exit 1)

  # ── Release build (no signing in CI) ────────────────────────────────────────
  build-release:
    name: Release Build
    runs-on: ubuntu-latest
    needs: build-debug   # Only build release if debug passes

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: gradle

      - name: Set up Android SDK + NDK
        uses: android-actions/setup-android@v3

      - run: sdkmanager "ndk;${{ env.NDK_VERSION }}" "cmake;${{ env.CMAKE_VERSION }}"

      - name: Build release APK (unsigned)
        run: ./gradlew assembleRelease --parallel --no-daemon

      - name: Verify no debug symbols in release .so
        run: |
          SO="app/build/intermediates/stripped_native_libs/release/out/lib/arm64-v8a/libhero_shooter_engine.so"
          SYMS=$(${ANDROID_SDK_ROOT}/ndk/${{ env.NDK_VERSION }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-nm "$SO" 2>/dev/null | wc -l)
          echo "Exported symbols in release .so: $SYMS"
          # Only android_main should be exported
          [ "$SYMS" -le 5 ] || \
              (echo "WARNING: Too many exported symbols in release build ($SYMS)" && exit 1)

      - uses: actions/upload-artifact@v4
        with:
          name: release-apks-unsigned
          path: app/build/outputs/apk/release/*.apk
          retention-days: 3
